{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar / Registrar - JB Chopeiras</title>
    <link rel="stylesheet" href="{% static 'JB_Chopeiras/css/login.css' %}">
</head>
<body>

<header class="topo">
    <div class="logo">JB</div>

    <nav class="menu-topo">
        <a href="/">Início</a>
        <a href="/">Dúvidas</a>
        <a href="/">Formulário</a>
        <a href="/">Serviços</a>
    </nav>

    <div class="usuario-topo">
        <a href="{% url 'tela_entrada' %}" class="login-link">
            <div class="bolinha-user"></div>
            <span>Entrar / Registrar</span>
        </a>
    </div>
</header>

<main class="area-login">
    <div class="card-login">

        <div class="box-form">
            <h2>Registrar</h2>

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="tipo_form" value="registro">

                <div class="linha-form">
                    <div class="grupo-input">
                        <label for="email_reg">Email</label>
                        <input type="email" id="email_reg" name="email" required>
                    </div>

                    <div class="grupo-input">
                        <label for="senha_reg">Senha</label>
                        <input type="password" id="senha_reg" name="senha" required>
                    </div>

                    <div class="grupo-input">
                        <label for="confirmar_senha">Confirmar senha</label>
                        <input type="password" id="confirmar_senha" name="confirmar_senha" required>
                    </div>

                    <div class="grupo-input">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="endereco">
                    </div>

                    <div class="grupo-input">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" name="telefone">
                    </div>
                </div>

                <button type="submit" class="btn-amarelo">Registrar</button>
            </form>
        </div>

        <div class="box-form">
    <h2>Entrar</h2>

    <form method="post" action="{% url 'tela_entrada' %}">
        {% csrf_token %}
        <input type="hidden" name="tipo_form" value="login">

                <div class="linha-form">
                    <div class="grupo-input">
                        <label for="email_login">Email</label>
                        <input type="email" id="email_login" name="email" required>
                    </div>

                    <div class="grupo-input">
                        <label for="senha_login">Senha</label>
                        <input type="password" id="senha_login" name="senha" required>
                    </div>
                </div>

                <a href="#" class="link-recuperar">Recuperar Senha</a>
                <button type="submit" class="btn-amarelo">Entrar</button>
            </form>
        </div>

    </div>
</main>

<footer class="rodape">
    <p>JB Chopeiras</p>
    <small>Contato: (43) 99999-9999 | Londrina - PR</small>
</footer>

</body>
</html>
